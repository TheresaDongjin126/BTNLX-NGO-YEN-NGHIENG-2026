<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Khoảnh khắc Trại</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <nav>
        <div class="logo">
            <a href="../index.html">🏕️ BTN Linh Xuân</a>
        </div>

        <button class="menu-toggle" type="button">
            ☰
        </button>

        <div class="menu">
            <a href="../index.html">Home</a>
            <a href="schedule.html">Lịch trình</a>
            <a href="confession.html">Confession</a>
            <a href="btc.html">BTC</a>
            <a href="groups.html">Danh sách nhóm</a>
            <a href="gallery.html" class="active">Khoảnh khắc</a>
        </div>
    </nav>

    <section class="page-title">

        <h1>📸 Khoảnh khắc Trại</h1>

        <p>
            Những hình ảnh đẹp được cập nhật trong suốt kỳ trại.
        </p>

        <a href="https://forms.gle/Zti5JjRxk8KxdCaSA" target="_blank" class="hero-button">

            📤 Đăng khoảnh khắc

        </a>

    </section>

    <section class="feed">

        <div id="posts"></div>

    </section>

    <script>

        const toggle = document.querySelector(".menu-toggle");
        const menu = document.querySelector(".menu");

        // Mở / đóng menu
        toggle.addEventListener("click", () => {

            menu.classList.toggle("show");

            toggle.textContent =
                menu.classList.contains("show")
                    ? "✕"
                    : "☰";

        });

        // Bấm vào link thì đóng menu
        document.querySelectorAll(".menu a").forEach(link => {

            link.addEventListener("click", () => {

                menu.classList.remove("show");
                toggle.textContent = "☰";

            });

        });

        // Bấm ra ngoài thì đóng menu
        document.addEventListener("click", (e) => {

            if (
                !menu.contains(e.target) &&
                !toggle.contains(e.target)
            ) {

                menu.classList.remove("show");
                toggle.textContent = "☰";

            }

        });

        const api =
            "https://script.google.com/macros/s/AKfycbzs21sCd4Yewd3aEe4MAjzMhOWn6DTPCeJid05KJnSXyrX_nHYMXm_dETfxSh0EJmLFOw/exec";

        fetch(api)
            .then(res => {
                console.log("Status:", res.status);
                return res.json();
            })
            .then(data => {

                console.log("DATA =", data);

                const posts = document.getElementById("posts");

                data.forEach(post => {

                    console.log(post);

                    const card = document.createElement("div");

                    card.className = "post";

                    card.innerHTML = `
            <div class="post-header">
                👤 ${post.name}
            </div>

            <img src="${post.image}" class="post-image">

            <div class="post-caption">
                ${post.caption}
            </div>

            <div class="post-time">
                ${new Date(post.time).toLocaleString("vi-VN")}
            </div>
        `;
        console.log(card);
                    posts.appendChild(card);

                });

            })
            .catch(err => {
                console.error(err);
            });
    </script>
</body>

</html>
