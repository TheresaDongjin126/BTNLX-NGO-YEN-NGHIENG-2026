<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khoảnh khắc Trại</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <nav>
        <div class="logo">
            <a href="../index.html">🏕️ BTN Linh Xuân</a>
        </div>

        <button class="menu-toggle" type="button">
            ☰
        </button>

        <div class="menu">
            <a href="../index.html">Home</a>
            <a href="schedule.html">Lịch trình</a>
            <a href="confession.html">Confession</a>
            <a href="btc.html">BTC</a>
            <a href="groups.html">Danh sách nhóm</a>
            <a href="gallery.html" class="active">Khoảnh khắc</a>
        </div>
    </nav>

    <section class="page-title">

        <h1>📸 Khoảnh khắc Trại</h1>

        <p>
            Những hình ảnh đẹp được cập nhật trong suốt kỳ trại.
        </p>

        <a href="https://forms.gle/Zti5JjRxk8KxdCaSA" target="_blank" class="hero-button">

            📤 Đăng khoảnh khắc

        </a>

    </section>

    <section class="feed">

        <div id="posts">
            <p id="loading">📸 Đang tải khoảnh khắc...</p>
        </div>

    </section>

    <script>

        const toggle = document.querySelector(".menu-toggle");
        const menu = document.querySelector(".menu");

        // ================= MENU =================

        toggle.addEventListener("click", () => {

            menu.classList.toggle("show");

            toggle.textContent =
                menu.classList.contains("show")
                    ? "✕"
                    : "☰";

        });

        document.querySelectorAll(".menu a").forEach(link => {

            link.addEventListener("click", () => {

                menu.classList.remove("show");
                toggle.textContent = "☰";

            });

        });

        document.addEventListener("click", (e) => {

            if (
                !menu.contains(e.target) &&
                !toggle.contains(e.target)
            ) {

                menu.classList.remove("show");
                toggle.textContent = "☰";

            }

        });

        // ================= API =================

        const api =
            "https://script.google.com/macros/s/AKfycbzs21sCd4Yewd3aEe4MAjzMhOWn6DTPCeJid05KJnSXyrX_nHYMXm_dETfxSh0EJmLFOw/exec";

        // ================= LOAD POSTS =================

        function loadPosts() {

            fetch(api)
                .then(res => res.json())
                .then(data => {

                    const posts = document.getElementById("posts");

                    posts.innerHTML = "";

                    data.forEach(post => {

                        let imageHTML = "";

                        // ===== 1 ảnh =====

                        if (post.images.length === 1) {

                            imageHTML = `
                            <img
                                src="${post.images[0]}"
                                class="post-image">
                        `;

                        }

                        // ===== nhiều ảnh =====

                        else {

                            imageHTML = `
                            <div class="slider"
                                data-images='${JSON.stringify(post.images)}'>
        
                                <button class="prev">‹</button>
        
                                <img
                                    src="${post.images[0]}"
                                    class="slider-image">
        
                                <button class="next">›</button>
        
                                <div class="counter">
                                    1 / ${post.images.length}
                                </div>
        
                            </div>
                        `;

                        }

                        posts.innerHTML += `
        
                        <div class="post">
        
                            <div class="post-header">
                                👤 ${post.name}
                            </div>
        
                            ${imageHTML}
        
                            <div class="post-caption">
                                ${post.caption}
                            </div>
        
                            <div class="post-time">
                                ${new Date(post.time).toLocaleString("vi-VN")}
                            </div>
        
                        </div>
        
                    `;

                    });

                    // ================= SLIDER =================

                    document.querySelectorAll(".slider").forEach(slider => {

                        const images =
                            JSON.parse(slider.dataset.images);

                        let index = 0;

                        const img =
                            slider.querySelector(".slider-image");

                        const counter =
                            slider.querySelector(".counter");

                        slider.querySelector(".next").onclick = () => {

                            index++;

                            if (index >= images.length)
                                index = 0;

                            img.src = images[index];

                            counter.textContent =
                                `${index + 1} / ${images.length}`;

                        };

                        slider.querySelector(".prev").onclick = () => {

                            index--;

                            if (index < 0)
                                index = images.length - 1;

                            img.src = images[index];

                            counter.textContent =
                                `${index + 1} / ${images.length}`;

                        };

                    });

                });

        }

        loadPosts();

        setInterval(loadPosts, 15000);

    </script>
</body>

</html>
