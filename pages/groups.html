<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách nhóm trại</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <nav>
        <div class="logo">
            <a href="../index.html" class="logo">
                🏕️ BTN Linh Xuân
            </a>
        </div>

        <button class="menu-toggle" type="button">
            ☰
        </button>

        <div class="menu">
            <a href="../index.html">Home</a>
            <a href="schedule.html">Lịch trình</a>
            <a href="confession.html">Confession</a>
            <a href="letter.html">Gửi thư</a>
            <a href="btc.html">BTC</a>
            <a href="groups.html" class="active">Danh sách nhóm</a>
            <a href="gallery.html">Khoảnh khắc</a>
        </div>
    </nav>

    <div class="group-card">
        <h2>🟢 Nhóm 1</h2>
        <p>
            <strong>Trưởng nhóm:</strong>
            Nguyễn Thị Tường Vy
        </p>
        <hr>
        <ul>
            <li>Nguyễn Văn A</li>
            <li>Trần Văn B</li>
            <li>Lê Văn C</li>
        </ul>
    </div>

    <footer>
        <p>© 2026 BTN Linh Xuân Camp</p>
        <p>Made with Diệp Đoan Trinh</p>
    </footer>

    <script>

        const toggle = document.querySelector(".menu-toggle");
        const menu = document.querySelector(".menu");

        // Mở / đóng menu
        toggle.addEventListener("click", () => {

            menu.classList.toggle("show");

            toggle.textContent =
                menu.classList.contains("show")
                    ? "✕"
                    : "☰";

        });

        // Bấm vào link thì đóng menu
        document.querySelectorAll(".menu a").forEach(link => {

            link.addEventListener("click", () => {

                menu.classList.remove("show");
                toggle.textContent = "☰";

            });

        });

        // Bấm ra ngoài thì đóng menu
        document.addEventListener("click", (e) => {

            if (
                !menu.contains(e.target) &&
                !toggle.contains(e.target)
            ) {

                menu.classList.remove("show");
                toggle.textContent = "☰";

            }

        });
    </script>
</body>

</html>
