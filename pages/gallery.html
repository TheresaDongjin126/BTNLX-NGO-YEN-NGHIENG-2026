<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Khoảnh khắc Trại</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <nav>
        <div class="logo">
            <a href="../index.html">🏕️ BTN Linh Xuân</a>
        </div>

        <button class="menu-toggle" type="button">
            ☰
        </button>

        <div class="menu">
            <a href="../index.html">Home</a>
            <a href="schedule.html">Lịch trình</a>
            <a href="confession.html">Confession</a>
            <a href="btc.html">BTC</a>
            <a href="groups.html">Danh sách nhóm</a>
            <a href="gallery.html" class="active">Khoảnh khắc</a>
        </div>
    </nav>

    <section class="page-title">
        <h1>📸 Khoảnh khắc Trại</h1>

        <p>
            Những hình ảnh đẹp được cập nhật trong suốt kỳ trại.
        </p>
    </section>

    <section class="gallery">

        <img src="../images/gallery/1.jpg">
        <img src="../images/gallery/2.jpg">
        <img src="../images/gallery/3.jpg">
        <img src="../images/gallery/4.jpg">
        <img src="../images/gallery/5.jpg">
        <img src="../images/gallery/6.jpg">

    </section>

    <script>

        const toggle = document.querySelector(".menu-toggle");
        const menu = document.querySelector(".menu");

        // Mở / đóng menu
        toggle.addEventListener("click", () => {

            menu.classList.toggle("show");

            toggle.textContent =
                menu.classList.contains("show")
                    ? "✕"
                    : "☰";

        });

        // Bấm vào link thì đóng menu
        document.querySelectorAll(".menu a").forEach(link => {

            link.addEventListener("click", () => {

                menu.classList.remove("show");
                toggle.textContent = "☰";

            });

        });

        // Bấm ra ngoài thì đóng menu
        document.addEventListener("click", (e) => {

            if (
                !menu.contains(e.target) &&
                !toggle.contains(e.target)
            ) {

                menu.classList.remove("show");
                toggle.textContent = "☰";

            }

        });
    </script>
</body>

</html>
