<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi thư</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <nav>
        <div class="logo">
            <a href="../index.html" class="logo">
                🏕️ BTN Linh Xuân
            </a>
        </div>

        <button class="menu-toggle" type="button">
            ☰
        </button>

        <div class="menu">
            <a href="../index.html">Home</a>
            <a href="schedule.html">Lịch trình</a>
            <a href="confession.html">Confession</a>
            <a href="letter.html" class="active">Gửi thư</a>
            <a href="btc.html">BTC</a>
            <a href="groups.html">Danh sách nhóm</a>
            <a href="gallery.html">Khoảnh khắc</a>
        </div>
    </nav>

    <section class="page-title">
        <h1>💌 Gửi thư</h1>
        <p>Viết thư để gửi đến trại sinh hoặc Ban Tổ chức.</p>
    </section>

    <form class="confession-form">
        <label>Người nhận</label>
        <select>
            <option>Nhóm 1</option>
            <option>Nhóm 2</option>
            <option>Nhóm 3</option>
        </select>
        <label>Tên người gửi</label>
        <input type="text">
        <label>Nội dung</label>
        <textarea rows="8"></textarea>
    </form>

    <footer>
        <p>© 2026 BTN Linh Xuân Camp</p>
        <p>Made with Diệp Đoan Trinh</p>
    </footer>
    <script>

        const toggle = document.querySelector(".menu-toggle");
        const menu = document.querySelector(".menu");

        // Mở / đóng menu
        toggle.addEventListener("click", () => {

            menu.classList.toggle("show");

            toggle.textContent =
                menu.classList.contains("show")
                    ? "✕"
                    : "☰";

        });

        // Bấm vào link thì đóng menu
        document.querySelectorAll(".menu a").forEach(link => {

            link.addEventListener("click", () => {

                menu.classList.remove("show");
                toggle.textContent = "☰";

            });

        });

        // Bấm ra ngoài thì đóng menu
        document.addEventListener("click", (e) => {

            if (
                !menu.contains(e.target) &&
                !toggle.contains(e.target)
            ) {

                menu.classList.remove("show");
                toggle.textContent = "☰";

            }

        });
    </script>
</body>

</html>
